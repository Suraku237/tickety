name: tickety
description: "TICKETY — Smart Queue Management"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Networking ──────────────────────────────────────────────
  http: ^1.2.1

  # ── Local storage ───────────────────────────────────────────
  shared_preferences: ^2.2.2

  # ── QR / Barcode scanner ────────────────────────────────────
  # Requires camera permission on Android + iOS (see README).
  mobile_scanner: ^5.2.3

  # ── Icons ───────────────────────────────────────────────────
  cupertino_icons: ^1.0.6
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
